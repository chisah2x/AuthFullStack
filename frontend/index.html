<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskForge – Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-label">FRONTEND PROTOTYPE</span>
      <h1 class="nav-title">TaskForge</h1>
    </div>
    <button class="theme-btn" id="themeBtn">Light mode</button>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <div class="card">

      <!-- ===== FLASH MESSAGE ===== -->
      <!-- Shows messages passed between pages via URL parameters -->
      <!-- e.g. ?msg=registered or ?msg=loggedout -->
      <div class="flash-msg" id="flashMsg" style="display:none;"></div>

      <!-- ===== TABS ===== -->
      <div class="tabs">
        <button class="tab-btn active" id="loginTab">Login</button>
        <button class="tab-btn" id="signupTab">Sign up</button>
      </div>

      <!-- ===== LOGIN FORM ===== -->
      <form id="loginForm" class="form">

        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="you@example.com"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="Your password"
            class="form-input"
          />
        </div>

        <p class="error-msg" id="loginError"></p>

        <button type="submit" class="submit-btn" id="loginBtn">Login</button>

        <!-- Link to switch to register -->
        <p class="switch-link">
          Don't have an account?
          <a href="#" id="goToSignup">Sign up here</a>
        </p>

      </form>

      <!-- ===== REGISTER FORM ===== -->
      <form id="registerForm" class="form hidden">

        <div class="form-group">
          <label for="regName">Name</label>
          <input
            type="text"
            id="regName"
            placeholder="Your name"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="regEmail">Email</label>
          <input
            type="email"
            id="regEmail"
            placeholder="you@example.com"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="regPassword">Password</label>
          <input
            type="password"
            id="regPassword"
            placeholder="At least 6 characters"
            class="form-input"
          />
        </div>

        <p class="error-msg" id="registerError"></p>

        <button type="submit" class="submit-btn" id="registerBtn">
          Create account
        </button>

        <!-- Link to switch to login -->
        <p class="switch-link">
          Already have an account?
          <a href="#" id="goToLogin">Login here</a>
        </p>

      </form>

    </div>
  </main>

  <script src="js/auth-storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth-page.js"></script>

</body>
</html>
